name: Update War Stats

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install --user -r requirements.txt

      - name: Run update script
        environment: secrets
        env:
          COC_EMAIL: ${{ secrets.COC_EMAIL }}
          COC_PASSWORD: ${{ secrets.COC_PASSWORD }}
          CLAN_TAGS: ${{ secrets.CLAN_TAGS }}
        run: echo $COC_EMAIL && echo $COC_PASSWORD && echo $CLAN_TAGS # && python update_war_stats.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/wars.db docs/index.html
          git diff --quiet --cached || git commit -m "Update war stats $(date -u +%Y-%m-%d)"
          git push
