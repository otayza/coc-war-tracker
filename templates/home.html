<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Tracker - Selecciona un Clan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #f5c518;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        .subtitle {
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .clan-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 900px;
        }
        .clan-card {
            background: #16213e;
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: #eee;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .clan-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(245, 197, 24, 0.2);
        }
        .clan-card h2 {
            color: #f5c518;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }
        .clan-card .tag {
            color: #888;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <h1>⚔️ War Tracker</h1>
    <p class="subtitle">Selecciona un clan para ver sus estadísticas</p>

    <div class="clan-list">
        {% for clan in clans %}
        <a class="clan-card" href="./{{ clan.folder }}/index.html">
            <h2>{{ clan.name }}</h2>
            <p class="tag">{{ clan.tag }}</p>
        </a>
        {% endfor %}
    </div>
</body>
</html>
